<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الصيدلاني مصطفى عبد الزهرة هاشم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f9ff; padding: 10px; color: #1e293b; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .select-container { position: relative; margin-bottom: 10px; }
        #drugSelect { display: none; position: absolute; z-index: 1000; background: white; width: 100%; max-height: 350px; border: 2px solid #0ea5e9; border-radius: 0 0 10px 10px; overflow-y: auto; }
        #drugSelect.show { display: block; }
        input, select { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-family: 'Tajawal'; font-size: 1.1rem; outline: none; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-calc { background: #0ea5e9; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .dose-value { font-size: 3.2rem; font-weight: 900; color: #0369a1; text-align: center; margin: 10px 0; background: #e0f2fe; border-radius: 10px; padding: 10px; border: 2.5px dashed #0ea5e9; }
        .note-container { margin-top: 10px; padding: 12px; background: #fff9db; border-radius: 10px; border: 1px solid #fde68a; font-size: 1.1rem; text-align: center; }
        .btn-print { background: #059669; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; display: none; font-size: 1.1rem; }
        footer { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #64748b; font-weight: bold; }
        optgroup { font-weight: bold; color: #0369a1; background: #f8fafc; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h3><i class="fas fa-microscope"></i>  حساب جرع الشرابات </h3>
        <div class="select-container" id="mainContainer">
            <input type="text" id="searchDrug" placeholder="ابحث بالاسم العلمي..." onfocus="toggleList(true)" oninput="filterDrugs()" autocomplete="off">
            <select id="drugSelect" size="10" onchange="confirmSelection()">
                
                <optgroup label="البنسلينات (Penicillins)">
                    <option value="0.5" data-fr="3" data-dur="7-10 أيام" data-n="يُحفظ في الثلاجة (صلاحية 14 يوم).">Amoxicillin 125mg/5ml</option>
                    <option value="0.25" data-fr="3" data-dur="7-10 أيام" data-n="يُحفظ في الثلاجة (صلاحية 14 يوم).">Amoxicillin 250mg/5ml</option>
                    <option value="0.4" data-fr="3" data-dur="7 أيام" data-n="على معدة فارغة (قبل الأكل بساعة).">Ampicillin 125mg/5ml</option>
                    <option value="0.25" data-fr="3" data-dur="7 أيام" data-n="عند بداية الوجبة لتقليل اضطراب المعدة.">Co-amoxiclav 156.25mg/5ml</option>
                    <option value="0.15" data-fr="3" data-dur="7 أيام" data-n="يُرج جيداً ويحفظ في الثلاجة.">Co-amoxiclav 312.5mg/5ml</option>
                    <option value="0.2" data-fr="2" data-dur="7 أيام" data-n="كل 12 ساعة مع الطعام.">Co-amoxiclav 457mg/5ml</option>
                    <option value="0.1" data-fr="2" data-dur="7 أيام" data-n="كل 12 ساعة مع الطعام.">Co-amoxiclav 642.9mg/5ml</option>
                </optgroup>

                <optgroup label="السيفالوسبورينات (Cephalosporins)">
                    <option value="0.5" data-fr="3" data-dur="7 أيام" data-n="يُرج جيداً ويحفظ في الثلاجة.">Cephalexin 125mg/5ml</option>
                    <option value="0.25" data-fr="3" data-dur="7 أيام" data-n="يُرج جيداً ويحفظ في الثلاجة.">Cephalexin 250mg/5ml</option>
                    <option value="0.4" data-fr="3" data-dur="7 أيام" data-n="يُرج جيداً قبل كل جرعة.">Cefaclor 125mg/5ml</option>
                    <option value="0.2" data-fr="3" data-dur="7 أيام" data-n="يُرج جيداً قبل كل جرعة.">Cefaclor 250mg/5ml</option>
                    <option value="0.2" data-fr="3" data-dur="7 أيام" data-n="يمكن تناوله مع أو بدون طعام.">Cefadroxil 250mg/5ml</option>
                    <option value="0.1" data-fr="3" data-dur="7 أيام" data-n="يمكن تناوله مع أو بدون طعام.">Cefadroxil 500mg/5ml</option>
                    <option value="0.5" data-fr="2" data-dur="7-10 أيام" data-n="يُفضل تناوله مع الطعام لزيادة الامتصاص.">Cefuroxime 125mg/5ml</option>
                    <option value="0.25" data-fr="2" data-dur="7-10 أيام" data-n="يُفضل تناوله مع الطعام.">Cefuroxime 250mg/5ml</option>
                    <option value="0.4" data-fr="1" data-dur="5 أيام" data-n="مرة واحدة يومياً. يُرج جيداً.">Cefixime 100mg/5ml</option>
                    <option value="0.56" data-fr="1" data-dur="7 أيام" data-n="يُفصل عن الحديد والكالسيوم بساعتين.">Cefdinir 125mg/5ml</option>
                    <option value="0.28" data-fr="1" data-dur="7 أيام" data-n="يُفصل عن الحديد والكالسيوم بساعتين.">Cefdinir 250mg/5ml</option>
                </optgroup>

                <optgroup label="الماكروليدات (Macrolides)">
                    <option value="0.25" data-fr="1" data-dur="3-5 أيام" data-n="قبل الأكل بساعة أو بعده بساعتين.">Azithromycin 200mg/5ml</option>
                    <option value="0.5" data-fr="2" data-dur="7 أيام" data-n="يُرج جيداً ويؤخذ كل 12 ساعة.">Clarithromycin 125mg/5ml</option>
                    <option value="0.25" data-fr="2" data-dur="7 أيام" data-n="يُرج جيداً ويؤخذ كل 12 ساعة.">Clarithromycin 250mg/5ml</option>
                    <option value="0.5" data-fr="4" data-dur="7-10 أيام" data-n="قبل الأكل بساعة.">Erythromycin 200mg/5ml</option>
                </optgroup>

                <optgroup label="المسكنات والحرارة (Analgesics)">
                    <option value="0.6" data-fr="4" data-dur="عند اللزوم" data-n="كل 6 ساعات عند الحرارة.">Paracetamol 120mg/5ml</option>
                    <option value="0.3" data-fr="4" data-dur="عند اللزوم" data-n="كل 6 ساعات عند الحرارة.">Paracetamol 250mg/5ml</option>
                    <option value="0.5" data-fr="3" data-dur="عند اللزوم" data-n="دائماً بعد الطعام لتجنب آلام المعدة.">Ibuprofen 100mg/5ml</option>
                    <option value="0.25" data-fr="3" data-dur="عند اللزوم" data-n="دائماً بعد الطعام.">Ibuprofen 200mg/5ml</option>
                    <option value="0.15" data-fr="3" data-dur="عند اللزوم" data-n="قطرات فموية (بعد الطعام).">Diclofenac 15mg/ml</option>
                    <option value="0.5" data-fr="2" data-dur="عند اللزوم" data-n="مسكن ومضاد التهاب (بعد الطعام).">Naproxen 125mg/5ml</option>
                </optgroup>

                <optgroup label="أدوية أخرى (Others)">
                    <option value="0.4" data-fr="3" data-dur="5-7 أيام" data-n="مع الطعام لتقليل اضطراب المعدة.">Metronidazole 125mg/5ml</option>
                    <option value="0.2" data-fr="3" data-dur="5-7 أيام" data-n="مع الطعام.">Metronidazole 200mg/5ml</option>
                    <option value="2.0" data-fr="4" data-dur="7 أيام" data-n="لعلاج التهاب المسالك (مع الطعام).">Nitrofurantoin 25mg/5ml</option>
                    <option value="0.2" data-fr="1" data-dur="عند الحاجة" data-n="مضاد حساسية لا يسبب النعاس.">Desloratadine 0.5mg/ml</option>
                    <option value="1.0" data-fr="1" data-dur="عند الحاجة" data-n="مضاد حساسية (قد يسبب النعاس).">Chlorpheniramine 2mg/5ml</option>
                    <option value="0.33" data-fr="1" data-dur="3-5 أيام" data-n="صباحاً بعد الطعام مباشرة.">Prednisolone 15mg/5ml</option>
                    <option value="1.0" data-fr="1" data-dur="مرة واحدة" data-n="تكرر الجرعة بعد أسبوعين بالضبط.">Mebendazole 100mg/5ml</option>
                    <option value="2.0" data-fr="1" data-dur="لحين التحسن" data-n="ملين يُؤخذ مرة واحدة يومياً.">Lactulose 3.35g/5ml</option>
                    <option value="0.25" data-fr="2" data-dur="عند التقيؤ" data-n="قبل الطعام بنصف ساعة.">Ondansetron 4mg/5ml</option>
                    <option value="0.5" data-fr="3" data-dur="لحين التحسن" data-n="مضاد للتقيؤ (قبل الطعام).">Domperidone 5mg/5ml</option>
                </optgroup>
            </select>
        </div>
        <div class="row-3">
            <div><label>سنة</label><input type="number" id="ageY" oninput="calcW('y')"></div>
            <div><label>شهر</label><input type="number" id="ageM" oninput="calcW('m')"></div>
            <div><label>وزن (كجم)</label><input type="number" id="weight" step="0.1"></div>
        </div>
        <button class="btn-calc" onclick="calculate()">احسب الجرعة العلمية</button>
    </div>

    <div class="card">
        <div class="dose-value" id="resMl">0.0 مل</div>
        <div id="noteBox" class="note-container" style="display:none;">
            <p><strong id="resDrugName" style="font-size: 1.3rem; color: #0369a1;"></strong></p>
            <p><span id="resF"></span> - لمدة <span id="resD"></span></p>
            <p style="color:#b45309; margin-top:8px; font-weight: bold;"><i class="fas fa-info-circle"></i> <span id="resN"></span></p>
        </div>
        <button id="pBtn" class="btn-print" onclick="printL()"><i class="fas fa-print"></i> طباعة الملصق الآن</button>
    </div>
    <footer>الصيدلاني مصطفى عبد الزهرة هاشم</footer>
</div>

<script>
    const drugS = document.getElementById('drugSelect');
    const searchI = document.getElementById('searchDrug');
    function toggleList(s) { s ? drugS.classList.add('show') : drugS.classList.remove('show'); }
    function filterDrugs() {
        toggleList(true); let v = searchI.value.toLowerCase();
        for(let o of drugS.options) o.style.display = o.text.toLowerCase().includes(v) ? "" : "none";
    }
    function confirmSelection() { if(drugS.selectedIndex !== -1) { searchI.value = drugS.options[drugS.selectedIndex].text; toggleList(false); } }
    function calcW(t) {
        let y=document.getElementById('ageY'), m=document.getElementById('ageM'), w=document.getElementById('weight');
        if(t==='y' && y.value) { w.value = (parseFloat(y.value)*2)+8; m.value = ''; }
        else if(t==='m' && m.value) { w.value = (parseFloat(m.value)+9)/2; y.value = ''; }
    }
    function calculate() {
        let o = drugS.options[drugS.selectedIndex], w = parseFloat(document.getElementById('weight').value);
        if(!o || !w) return alert("يرجى اختيار الدواء وتحديد الوزن");
        document.getElementById('resMl').innerText = (w * parseFloat(o.value)).toFixed(1) + " مل";
        document.getElementById('resDrugName').innerText = searchI.value;
        document.getElementById('resF').innerText = o.getAttribute('data-fr') + " مرات يومياً";
        document.getElementById('resD').innerText = o.getAttribute('data-dur');
        document.getElementById('resN').innerText = o.getAttribute('data-n');
        document.getElementById('noteBox').style.display = "block";
        document.getElementById('pBtn').style.display = "block";
    }
    function printL() {
        const p = window.open('', '', 'width=400,height=400');
        p.document.write(`
            <html dir="rtl"><head><style>
                @page { size: 50mm 40mm; margin: 0; }
                body { font-family: 'Arial'; padding: 5px; text-align: center; color: black; }
                .name { font-size: 16px; font-weight: bold; border-bottom: 2px solid black; padding-bottom: 2px; }
                .dose { font-size: 45px; font-weight: 900; margin: 2px 0; }
                .info { font-size: 18px; font-weight: bold; }
                .note { font-size: 13px; font-weight: bold; margin-top: 3px; line-height: 1.2; }
                .footer { font-size: 10px; margin-top: 6px; border-top: 1px dashed black; padding-top: 3px; }
            </style></head><body onload="window.print();window.close()">
                <div class="name">${searchI.value}</div>
                <div class="dose">${document.getElementById('resMl').innerText}</div>
                <div class="info">${document.getElementById('resF').innerText} - ${document.getElementById('resD').innerText}</div>
                <div class="note">${document.getElementById('resN').innerText}</div>
                <div class="footer"> صيدلية حيا البنوك  </div>
            </body></html>`);
        p.document.close();
    }
    document.addEventListener('click', (e) => { if(!document.getElementById('mainContainer').contains(e.target)) toggleList(false); });
</script>
</body>
</html>
